# Deploy to Heroku after full CI pipeline passes on main branch.
#
# Required GitHub Secrets:
#   HEROKU_API_KEY   - Your Heroku API key (Account Settings > API Key)
#   HEROKU_APP_NAME  - The Heroku app name (e.g. "kisanseva-frontend")
#   HEROKU_EMAIL     - The email associated with your Heroku account
#
# To set these secrets:
#   1. Go to the repository on GitHub
#   2. Settings > Secrets and variables > Actions > New repository secret
#   3. Add HEROKU_API_KEY, HEROKU_APP_NAME, and HEROKU_EMAIL

name: Deploy to Heroku

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
